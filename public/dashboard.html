<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
</div>

<div class="container">

  <h1>📊 NGO Dashboard</h1>

  <!-- Welcome -->
  <div class="card">
    <h2>Welcome 👋</h2>
    <p id="ngoName"></p>
  </div>
  

  <!-- Stats -->
  <div class="card">
    <h2>Total Donations</h2>
    <p id="total"></p>
  </div>

  <div class="card">
    <h2>Pending</h2>
    <p id="pending"></p>
  </div>

  <div class="card">
    <h2>Completed</h2>
    <p id="completed"></p>
  </div>

  <!-- Chart -->
  <div class="card">
    <h2>📊 Donation Status</h2>
    <canvas id="chart"></canvas>
  </div>

  <!-- List -->
  <div class="card">
    <h2>All Donations</h2>
    <div id="list" class="dashboard-grid"></div>
  </div>

  <!-- Logout -->
  <button class="logout" onclick="logout()">Logout</button>

  <a href="index.html">
  <button>⬅ Back</button>
</a>
</div>

<script>

// 🔄 Hide loader
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};

// 👤 Show NGO name
const ngo = JSON.parse(localStorage.getItem("ngo"));
if (ngo) {
  document.getElementById("ngoName").innerText = ngo.name;
}

// 📊 Load all data
async function loadData() {
  const res = await fetch("/donations");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  let total = data.length;
  let pending = data.filter(d => d.status === "Pending").length;
  let completed = data.filter(d => d.status === "Completed").length;

  // 📈 Update stats
  document.getElementById("total").innerText = total;
  document.getElementById("pending").innerText = pending;
  document.getElementById("completed").innerText = completed;

  // 📋 Show list
  data.forEach(d => {
  list.innerHTML += `
    <div class="dashboard-card">

      <strong>🍛 ${d.food}</strong><br>
      <small>${d.quantity}</small><br>
      <span>${d.status}</span><br><br>

      ${
        d.status !== "Completed"
        ? `<button onclick="markComplete(${d.id})">✅ Complete</button>`
        : `<span style="color:lightgreen;">✔ Completed</span>`
      }

    </div>
  `;
});
  // 📊 Chart
  new Chart(document.getElementById("chart"), {
    type: "doughnut",
    data: {
      labels: ["Completed", "Pending"],
      datasets: [{
        data: [completed, pending],
        backgroundColor: ["#00c853", "#ff2e63"]
      }]
    }
  });
}

// ✅ Mark donation as completed
async function markComplete(id) {
  await fetch("/update/" + id, {
    method: "POST"
  });

  loadData(); // refresh UI
}

// 🔐 Logout
function logout() {
  localStorage.removeItem("ngo");
  window.location.href = "login.html";
}

// 🚀 Start app
loadData();

</script>

</body>
</html>
